name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libsqlite3-dev xvfb
      - name: Build
        run: make
      - name: Test
        run: make test
      - name: GTK module smoke test
        run: make smoke
