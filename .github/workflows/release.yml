name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libsqlite3-dev xvfb

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Smoke test GTK module ABI/loading
        run: make smoke

      - name: Stage prebuilt tarball
        run: |
          STAGE=$(mktemp -d)
          cp libgeary-email-autocomplete.so \
             packaging/aur/inject.sh \
             packaging/aur/geary-email-autocomplete.hook \
             LICENSE README.md "$STAGE/"
          tar czf geary-email-autocomplete-linux-x86_64.tar.gz -C "$STAGE" .
          sha256sum geary-email-autocomplete-linux-x86_64.tar.gz | awk '{print $1}' \
            > geary-email-autocomplete-linux-x86_64.tar.gz.sha256
          echo "sha256=$(cat geary-email-autocomplete-linux-x86_64.tar.gz.sha256)"

      - uses: actions/upload-artifact@v5
        with:
          name: bin-x86_64
          path: |
            geary-email-autocomplete-linux-x86_64.tar.gz
            geary-email-autocomplete-linux-x86_64.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1 || true)
          {
            echo "## Install (Arch / AUR)"
            echo
            echo '```bash'
            echo "yay -S geary-email-autocomplete       # source build; depends on geary-git"
            echo "yay -S geary-email-autocomplete-bin   # prebuilt .so; depends on geary stable"
            echo '```'
            echo
            echo "The package patches Geary's desktop entry and D-Bus service to append"
            echo "this module to GTK_MODULES without removing other modules such as"
            echo "geary-hide-sidebar. Restart Geary after installing: \`geary --quit\`."
            echo
            echo "## Checksums (SHA256)"
            echo '```'
            for f in artifacts/*.sha256; do
              echo "$(cat "$f")  $(basename "${f%.sha256}")"
            done
            echo '```'
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file body.md --latest
          fi

  publish-aur:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.ref != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Pin checksums + pkgver
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SRC_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SRC_SHA=$(curl -fsSL "$SRC_URL" | sha256sum | awk '{print $1}')
          sed -i "s/^pkgver=.*/pkgver=$VERSION/"            packaging/aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SRC_SHA')/" packaging/aur/PKGBUILD

          BIN_SHA=$(awk '{print $1}' artifacts/geary-email-autocomplete-linux-x86_64.tar.gz.sha256)
          sed -i "s/^pkgver=.*/pkgver=$VERSION/"                         packaging/aur/PKGBUILD-bin
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('$BIN_SHA')/" packaging/aur/PKGBUILD-bin

          mkdir -p staging/bin
          cp packaging/aur/PKGBUILD-bin staging/bin/PKGBUILD
          echo "src=$SRC_SHA bin=$BIN_SHA"

      - name: Check AUR_SSH_KEY presence
        id: aur_key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping AUR push — no AUR_SSH_KEY secret set"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish geary-email-autocomplete to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: geary-email-autocomplete
          pkgbuild: ./packaging/aur/PKGBUILD
          assets: |
            ./packaging/aur/geary-email-autocomplete.install
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "geary-email-autocomplete ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'

      - name: Publish geary-email-autocomplete-bin to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: geary-email-autocomplete-bin
          pkgbuild: ./staging/bin/PKGBUILD
          assets: |
            ./packaging/aur/geary-email-autocomplete.install
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "geary-email-autocomplete-bin ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'
